name: Build and Deploy

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Login to DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USER }}
        password: ${{ secrets.DOCKER_PASS }}

    - name: Build and Push Image
      run: |
        docker build -t ${{ secrets.DOCKER_USER }}/devops-app:latest .
        docker push ${{ secrets.DOCKER_USER }}/devops-app:latest

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
    - name: Deploy on server via SSH
      uses: appleboy/ssh-action@v0.1.6
      with:
        host: ${{ secrets.SERVER_IP }}
        username: ${{ secrets.SERVER_USER }}
        password: ${{ secrets.SERVER_PASSWORD }}
        script: |
          docker pull ${{ secrets.DOCKER_USER }}/devops-app:latest

          docker stop myapp || true
          docker rm myapp || true

          docker run -d -p 3000:3000 --restart always --name myapp ${{ secrets.DOCKER_USER }}/devops-app:latest
